<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShieldIQ</title>
    <meta name="description" content="Login to ShieldIQ - The cybersecurity awareness training platform for your team.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

    <div class="auth-bg"></div>

    <nav>
        <div class="logo">🛡️ ShieldIQ</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/register" class="btn-primary">Register</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">🔐</div>
                <h1>Welcome Back</h1>
                <p>Login to your ShieldIQ account</p>
            </div>

            <div id="error-msg" class="alert alert-error" style="display:none"></div>
            <div id="success-msg" class="alert alert-success" style="display:none"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@company.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" />
                        <span class="toggle-pass" onclick="togglePass()">👁️</span>
                    </div>
                </div>
                <div class="form-footer">
                    <label class="remember">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="/forgot-password" class="forgot">Forgot password?</a>
                </div>
                <button class="btn-primary full" onclick="handleLogin()">
                    Login →
                </button>
                <p class="auth-switch">
                    Don't have an account? <a href="/register">Register here</a>
                </p>
                <p class="auth-switch" id="resend-link" style="display:none">
                    Didn't get the code? <a href="#" onclick="resendVerification()">Resend it</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function togglePass() {
            const pass = document.getElementById('password');
            pass.type = pass.type === 'password' ? 'text' : 'password';
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            if (!email || !password) {
                errorMsg.textContent = 'Please fill in all fields';
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.requiresMFA) {
                    successMsg.textContent = 'Code sent! Redirecting...';
                    successMsg.style.display = 'block';
                    errorMsg.style.display = 'none';
                    // Pass email to verify page via sessionStorage
                    sessionStorage.setItem('mfa_email', email);
                    setTimeout(() => window.location.href = '/verify', 1000);
                } else {
                    errorMsg.textContent = data.message || 'Invalid credentials';
                    errorMsg.style.display = 'block';
                    successMsg.style.display = 'none';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
