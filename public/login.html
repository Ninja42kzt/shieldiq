<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldIQ - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

    <!-- Background -->
    <div class="auth-bg"></div>

    <!-- Nav -->
    <nav>
        <div class="logo">🛡️ ShieldIQ</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/register" class="btn-primary">Register</a>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">🔐</div>
                <h1>Welcome Back</h1>
                <p>Login to your ShieldIQ account</p>
            </div>

            <div id="error-msg" class="alert alert-error" style="display:none"></div>
            <div id="success-msg" class="alert alert-success" style="display:none"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@company.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" />
                        <span class="toggle-pass" onclick="togglePass()">👁️</span>
                    </div>
                </div>
                <div class="form-footer">
                    <label class="remember">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#" class="forgot">Forgot password?</a>
                </div>
                <button class="btn-primary full" onclick="handleLogin()">
                    Login
                </button>
                <p class="auth-switch">
                    Don't have an account? <a href="/register">Register here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
