<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ShieldIQ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

    <div class="auth-bg"></div>

    <nav>
        <div class="logo">🛡️ ShieldIQ</div>
        <div class="nav-links">
            <a href="/login">Back to Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Step 1: Enter email -->
            <div id="step-email">
                <div class="auth-header">
                    <div class="auth-icon">🔑</div>
                    <h1>Forgot Password</h1>
                    <p>Enter your email and we'll send a reset code</p>
                </div>
                <div id="error-msg-1" class="alert alert-error" style="display:none"></div>
                <div id="success-msg-1" class="alert alert-success" style="display:none"></div>
                <div class="auth-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reset-email" placeholder="you@company.com" />
                    </div>
                    <button class="btn-primary full" onclick="sendResetCode()">
                        Send Reset Code →
                    </button>
                    <p class="auth-switch">
                        Remember your password? <a href="/login">Login here</a>
                    </p>
                </div>
            </div>

            <!-- Step 2: Enter OTP + new password -->
            <div id="step-reset" style="display:none">
                <div class="auth-header">
                    <div class="auth-icon">📧</div>
                    <h1>Reset Password</h1>
                    <p id="reset-subtitle">Enter the code sent to your email</p>
                </div>
                <div id="error-msg-2" class="alert alert-error" style="display:none"></div>
                <div id="success-msg-2" class="alert alert-success" style="display:none"></div>
                <div class="auth-form">
                    <div class="form-group">
                        <label>Verification Code</label>
                        <input type="text" id="reset-otp" placeholder="000000" maxlength="6"
                            style="letter-spacing:8px; text-align:center; font-size:24px; font-weight:700"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" placeholder="Min 8 characters" />
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirm-new-password" placeholder="Repeat new password" />
                    </div>
                    <button class="btn-primary full" onclick="resetPassword()">
                        Reset Password →
                    </button>
                    <p class="auth-switch">
                        <a href="#" onclick="showStep1()">← Use a different email</a>
                    </p>
                </div>
            </div>

        </div>
    </div>

    <script>
        let resetEmail = '';

        async function sendResetCode() {
            const email = document.getElementById('reset-email').value.trim();
            const errorMsg = document.getElementById('error-msg-1');
            const successMsg = document.getElementById('success-msg-1');

            if (!email) {
                errorMsg.textContent = 'Please enter your email';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                resetEmail = email;

                successMsg.textContent = data.message;
                successMsg.style.display = 'block';
                errorMsg.style.display = 'none';

                setTimeout(() => {
                    document.getElementById('step-email').style.display = 'none';
                    document.getElementById('step-reset').style.display = 'block';
                    document.getElementById('reset-subtitle').textContent = `Enter the code sent to ${email}`;
                }, 1200);

            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.style.display = 'block';
            }
        }

        async function resetPassword() {
            const otp = document.getElementById('reset-otp').value.trim();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-new-password').value;
            const errorMsg = document.getElementById('error-msg-2');
            const successMsg = document.getElementById('success-msg-2');

            if (otp.length !== 6) {
                errorMsg.textContent = 'Please enter the 6-digit code';
                errorMsg.style.display = 'block';
                return;
            }

            if (newPassword.length < 8) {
                errorMsg.textContent = 'Password must be at least 8 characters';
                errorMsg.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail, otp, newPassword })
                });

                const data = await res.json();

                if (res.ok) {
                    successMsg.textContent = data.message;
                    successMsg.style.display = 'block';
                    errorMsg.style.display = 'none';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    errorMsg.textContent = data.message || 'Reset failed';
                    errorMsg.style.display = 'block';
                    successMsg.style.display = 'none';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.style.display = 'block';
            }
        }

        function showStep1() {
            document.getElementById('step-reset').style.display = 'none';
            document.getElementById('step-email').style.display = 'block';
        }
    </script>
</body>
</html>
