<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ShieldIQ</title>
    <meta name="description" content="Create your ShieldIQ account and start cybersecurity awareness training.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
    <div class="auth-bg"></div>

    <nav>
        <div class="logo">🛡️ ShieldIQ</div>
        <button class="nav-toggle" onclick="document.getElementById('nav-links').classList.toggle('open')" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="nav-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
            <a href="/pricing">Pricing</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">🛡️</div>
                <h1>Create Account</h1>
                <p>Join ShieldIQ and start your cybersecurity journey</p>
            </div>

            <div id="error-msg" class="alert alert-error" style="display:none"></div>
            <div id="success-msg" class="alert alert-success" style="display:none"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe"/>
                </div>
                <div class="form-group">
                    <label>Company / Organization</label>
                    <input type="text" id="company" placeholder="Acme Ltd"/>
                </div>
                <div class="form-group">
                    <label>Work Email</label>
                    <input type="email" id="email" placeholder="you@company.com"/>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Min 8 characters"/>
                        <span class="toggle-pass" onclick="togglePass()">👁️</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>I am registering as</label>
                    <select id="role">
                        <option value="employee">Employee (joining my company)</option>
                        <option value="admin">IT Admin (setting up for my company)</option>
                    </select>
                </div>
                <button class="btn-primary full" onclick="handleRegister()">
                    Create Account →
                </button>
                <p class="auth-switch">
                    Already have an account? <a href="/login">Login here</a>
                </p>
                <p class="auth-switch" style="margin-top:8px">
                    Need team features? <a href="/pricing">View pricing</a>
                </p>
            </div>
        </div>
    </div>

    <!-- OTP Verification Modal -->
    <div id="verify-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:none;align-items:center;justify-content:center;padding:20px">
        <div class="auth-card" style="max-width:400px">
            <div class="auth-header">
                <div class="auth-icon">📧</div>
                <h1>Verify Email</h1>
                <p id="verify-subtitle">Enter the 6-digit code sent to your email</p>
            </div>
            <div id="otp-error" class="alert alert-error" style="display:none"></div>
            <div id="otp-success" class="alert alert-success" style="display:none"></div>
            <div class="form-group">
                <input type="text" id="otp-input" placeholder="000000" maxlength="6"
                    style="letter-spacing:8px;text-align:center;font-size:24px;font-weight:700"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'');if(this.value.length===6)verifyOTP()"/>
            </div>
            <button class="btn-primary full" onclick="verifyOTP()">Verify & Continue →</button>
        </div>
    </div>

    <script>
        let registeredEmail = '';

        function togglePass() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        async function handleRegister() {
            const name = document.getElementById('name').value.trim();
            const company = document.getElementById('company').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!name || !company || !email || !password) {
                errorMsg.textContent = 'Please fill in all fields';
                errorMsg.style.display = 'block'; return;
            }
            if (password.length < 8) {
                errorMsg.textContent = 'Password must be at least 8 characters';
                errorMsg.style.display = 'block'; return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, company, email, password, role })
                });

                const data = await res.json();

                if (res.ok) {
                    registeredEmail = email;
                    successMsg.textContent = data.message;
                    successMsg.style.display = 'block';
                    document.getElementById('verify-subtitle').textContent = `Enter the code sent to ${email}`;
                    setTimeout(() => {
                        document.getElementById('verify-modal').style.display = 'flex';
                    }, 800);
                } else {
                    errorMsg.textContent = data.message || 'Registration failed';
                    errorMsg.style.display = 'block';
                }
            } catch(e) {
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.style.display = 'block';
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp-input').value.trim();
            const errorMsg = document.getElementById('otp-error');
            const successMsg = document.getElementById('otp-success');

            if (otp.length !== 6) {
                errorMsg.textContent = 'Please enter the 6-digit code';
                errorMsg.style.display = 'block'; return;
            }

            try {
                const res = await fetch('/api/auth/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: registeredEmail, otp })
                });

                const data = await res.json();

                if (res.ok) {
                    successMsg.textContent = data.message;
                    successMsg.style.display = 'block';
                    errorMsg.style.display = 'none';
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    errorMsg.textContent = data.message || 'Invalid code';
                    errorMsg.style.display = 'block';
                    document.getElementById('otp-input').value = '';
                }
            } catch(e) {
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
