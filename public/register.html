<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldIQ - Register</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

    <div class="auth-bg"></div>

    <nav>
        <div class="logo">🛡️ ShieldIQ</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/login" class="btn-outline">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">🚀</div>
                <h1>Get Started</h1>
                <p>Create your ShieldIQ account</p>
            </div>

            <div id="error-msg" class="alert alert-error" style="display:none"></div>
            <div id="success-msg" class="alert alert-success" style="display:none"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" />
                </div>
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="company" placeholder="Acme Ltd" />
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@company.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" />
                        <span class="toggle-pass" onclick="togglePass()">👁️</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm-password" placeholder="••••••••" />
                    </div>
                </div>
                <button class="btn-primary full" onclick="handleRegister()">
                    Create Account
                </button>
                <p class="auth-switch">
                    Already have an account? <a href="/login">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
